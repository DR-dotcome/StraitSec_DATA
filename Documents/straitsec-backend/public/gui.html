<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StraitSec Admin | Messages</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg-dark: #0b0e11;
      --bg-card: #151a20;
      --text-primary: #eef2f6;
      --text-secondary: #8b95a1;
      --accent-blue: #0a84ff;
      --accent-cyan: #00d4ff;
      --border-light: rgba(255,255,255,0.06);
      --shadow: 0 8px 20px rgba(0,0,0,0.4);
      --new-badge: #f59e0b;
      --read-badge: #10b981;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 24px 32px;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .navbar h1 {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff, #0a84ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .navbar i {
      color: var(--accent-blue);
      margin-right: 10px;
    }
    .refresh-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .refresh-btn:hover {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }
    .search-wrapper {
      flex: 1;
      min-width: 260px;
      position: relative;
    }
    .search-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }
    #searchInput {
      width: 100%;
      padding: 14px 20px 14px 48px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 40px;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    #searchInput:focus {
      border-color: var(--accent-blue);
    }
    .stats {
      display: flex;
      gap: 16px;
      color: var(--text-secondary);
    }
    .stats span {
      background: var(--bg-card);
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 500;
    }

    .messages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .message-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow);
      transition: transform 0.25s, border-color 0.25s;
      display: flex;
      flex-direction: column;
    }
    .message-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-blue);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .card-header h3 {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text-primary);
    }
    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .status-badge.new {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .status-badge.read {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .email {
      color: var(--accent-cyan);
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .message-content {
      background: rgba(0,0,0,0.2);
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 20px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.5;
      flex: 1;
      word-break: break-word;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 18px;
    }
    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: auto;
    }
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-icon:hover {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
    }
    .btn-danger:hover {
      background: #dc2626;
      border-color: #dc2626;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      background: var(--bg-card);
      border-radius: 24px;
      border: 1px dashed var(--border-light);
    }
    .empty-state i {
      font-size: 3.5rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
      opacity: 0.6;
    }
    .empty-state p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .loader {
      display: flex;
      justify-content: center;
      padding: 60px;
      grid-column: 1 / -1;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(10,132,255,0.2);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1e2a3a;
      color: white;
      padding: 14px 24px;
      border-radius: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border-left: 4px solid var(--accent-blue);
      transform: translateX(120%);
      transition: transform 0.3s ease;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(0);
    }

    @media (max-width: 600px) {
      body { padding: 20px 16px; }
      .navbar h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <h1><i class="fas fa-shield-halved"></i> StraitSec Admin</h1>
    <button class="refresh-btn" id="refreshBtn"><i class="fas fa-arrows-rotate"></i> Refresh</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search by name or email..." autocomplete="off">
    </div>
    <div class="stats">
      <span id="messageCount">0 messages</span>
    </div>
  </div>

  <!-- Messages Grid -->
  <div id="messagesContainer" class="messages-grid">
    <div class="loader"><div class="spinner"></div></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">✓ Message deleted</div>

  <script>
    (function() {
      'use strict';

      // ---------- SIMPLE PASSWORD PROTECTION ----------
      const ADMIN_PASSWORD = 'admin123'; // change for production
      if (!sessionStorage.getItem('adminAuth')) {
        const pwd = prompt('Enter admin password:');
        if (pwd !== ADMIN_PASSWORD) {
          alert('Access denied');
          window.location.href = '/';
          return;
        }
        sessionStorage.setItem('adminAuth', 'true');
      }

      // ---------- CONFIG ----------
      const API_BASE = 'http://localhost:5000/api';
      let allMessages = [];
      let filteredMessages = [];

      const container = document.getElementById('messagesContainer');
      const searchInput = document.getElementById('searchInput');
      const refreshBtn = document.getElementById('refreshBtn');
      const messageCountSpan = document.getElementById('messageCount');
      const toast = document.getElementById('toast');

      // ---------- TOAST ----------
      function showToast(text, isSuccess = true) {
        toast.textContent = text;
        toast.style.borderLeftColor = isSuccess ? 'var(--accent-blue)' : '#dc2626';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }

      // ---------- FETCH MESSAGES ----------
      async function fetchMessages() {
        try {
          container.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
          const res = await fetch(`${API_BASE}/messages`);
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${res.statusText}`);
          }
          allMessages = await res.json();
          filteredMessages = [...allMessages];
          renderMessages();
        } catch (err) {
          console.error('Fetch error:', err);
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-exclamation-triangle"></i>
              <p>Error loading messages</p>
              <small style="color: #666; display: block; margin-top: 8px;">${err.message}</small>
              <small style="color: #666;">Make sure backend is running on port 5000</small>
            </div>
          `;
          messageCountSpan.textContent = '0 messages';
          showToast('Failed to load messages', false);
        }
      }

      // ---------- DELETE MESSAGE ----------
      async function deleteMessage(id) {
        try {
          const res = await fetch(`${API_BASE}/messages/${id}`, { method: 'DELETE' });
          if (!res.ok) throw new Error('Delete failed');
          allMessages = allMessages.filter(m => m.id !== id);
          filteredMessages = filteredMessages.filter(m => m.id !== id);
          renderMessages();
          showToast('✓ Message deleted');
        } catch (err) {
          console.error(err);
          showToast('Failed to delete message', false);
        }
      }

      // ---------- MARK AS READ ----------
      async function markAsRead(id) {
        try {
          const res = await fetch(`${API_BASE}/messages/${id}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'Read' })
          });
          if (!res.ok) throw new Error('Update failed');
          const msg = allMessages.find(m => m.id === id);
          if (msg) msg.status = 'Read';
          const fMsg = filteredMessages.find(m => m.id === id);
          if (fMsg) fMsg.status = 'Read';
          renderMessages();
          showToast('✓ Marked as read');
        } catch (err) {
          console.error(err);
          showToast('Update failed', false);
        }
      }

      // ---------- RENDER CARDS ----------
      function renderMessages() {
        if (filteredMessages.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <p>No messages found</p>
            </div>
          `;
          messageCountSpan.textContent = '0 messages';
          return;
        }

        let html = '';
        filteredMessages.forEach(msg => {
          const date = new Date(msg.timestamp).toLocaleString('en-US', {
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
          });
          const statusClass = msg.status === 'Read' ? 'read' : 'new';
          const isRead = msg.status === 'Read';

          html += `
            <div class="message-card" data-id="${msg.id}">
              <div class="card-header">
                <h3>${escapeHtml(msg.name)}</h3>
                <span class="status-badge ${statusClass}">${msg.status}</span>
              </div>
              <div class="email">
                <i class="fas fa-envelope"></i> ${escapeHtml(msg.email)}
              </div>
              <div class="message-content">
                ${escapeHtml(msg.message)}
              </div>
              <div class="meta">
                <span><i class="far fa-clock"></i> ${date}</span>
                <span><i class="fas fa-phone"></i> ${escapeHtml(msg.phone || '—')}</span>
              </div>
              <div class="card-actions">
                ${!isRead ? `
                  <button class="btn-icon mark-read-btn" data-id="${msg.id}">
                    <i class="fas fa-check-circle"></i> Mark Read
                  </button>
                ` : ''}
                <button class="btn-icon btn-danger delete-btn" data-id="${msg.id}">
                  <i class="fas fa-trash-alt"></i> Delete
                </button>
              </div>
            </div>
          `;
        });

        container.innerHTML = html;
        messageCountSpan.textContent = `${filteredMessages.length} message${filteredMessages.length !== 1 ? 's' : ''}`;

        // Attach event listeners
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            if (confirm('Delete this message permanently?')) {
              deleteMessage(id);
            }
          });
        });

        document.querySelectorAll('.mark-read-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            markAsRead(id);
          });
        });
      }

      // Simple escape function
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // ---------- FILTER (SEARCH) ----------
      function filterMessages() {
        const term = searchInput.value.toLowerCase().trim();
        if (!term) {
          filteredMessages = [...allMessages];
        } else {
          filteredMessages = allMessages.filter(msg =>
            msg.name.toLowerCase().includes(term) ||
            msg.email.toLowerCase().includes(term)
          );
        }
        renderMessages();
      }

      // ---------- EVENT LISTENERS ----------
      searchInput.addEventListener('input', filterMessages);
      refreshBtn.addEventListener('click', fetchMessages);

      // Initial load
      fetchMessages();
    })();
  </script>
</body>
</html>
